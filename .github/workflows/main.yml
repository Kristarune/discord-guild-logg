name: Discord Logger

on: workflow_dispatch:

jobs: run-bot: runs-on: ubuntu-latest timeout-minutes: 350

steps: - name: Checkout repository uses: actions/checkout@v4 - name: Set up Node.js uses: actions/setup-node@v4 with: node-version: 20 - name: Install dependencies run: npm install - name: Register slash command env: DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }} CLIENT_ID: ${{ secrets.CLIENT_ID }} GUILD_ID: ${{ secrets.GUILD_ID }} run: npm run deploy - name: Start logger bot env: DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }} GUILD_ID: ${{ secrets.GUILD_ID }} run: npm start 
