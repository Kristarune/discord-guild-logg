name: auto-rerun

on:
  workflow_run:
    workflows: ["runner"]
    types: [completed]

jobs:
  auto-rerun:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    steps:
      - name: Rerun failed runner workflow
        uses: actions/github-script@v7
        with:
          script: |
            const runId = context.payload.workflow_run.id;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            
            console.log(`Rerunning workflow ${runId}...`);
            
            try {
              const response = await github.rest.actions.reRunWorkflow({
                owner: owner,
                repo: repo,
                run_id: runId
              });
              console.log('Workflow rerun initiated successfully');
              console.log(response);
            } catch (error) {
              console.error('Failed to rerun workflow:', error);
            }
