name: Upstream Auto-Rerun

on:
  workflow_run:
    workflows: ["runner"]
    types: [completed]

jobs:
  trigger-upstream:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    steps:
      - name: Trigger upstream workflow
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const workflowId = 'runner';
            
            console.log(`Triggering workflow ${workflowId} in ${owner}/${repo}...`);
            
            try {
              const response = await github.rest.actions.createWorkflowDispatch({
                owner: owner,
                repo: repo,
                workflow_id: workflowId,
                ref: 'main'
              });
              console.log('Upstream workflow triggered successfully');
              console.log(response);
            } catch (error) {
              console.error('Failed to trigger upstream workflow:', error);
            }
